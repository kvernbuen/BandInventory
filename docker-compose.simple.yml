services:
  bandinventory:
    build: .
    ports:
      - "3001:3000"
    volumes:
      - bandinventory-data:/data
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_PATH=/data/bandinventory.db
      - SESSION_SECRET=change-this-to-a-random-secret

volumes:
  bandinventory-data:
