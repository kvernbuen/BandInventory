services:
  bandinventory:
    build: .
    expose:
      - "3001"
    volumes:
      - bandinventory-data:/data
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_PATH=/data/bandinventory.db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - bandinventory
    restart: unless-stopped

volumes:
  bandinventory-data:
