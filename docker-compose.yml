services:
  korpsinventar:
    build: .
    expose:
      - "3000"
    volumes:
      - korpsinventar-data:/data
    restart: unless-stopped
    environment:
      - PORT=3001
      - DB_PATH=/data/korpsinventar.db

  nginx:
    image: nginx:alpine
    ports:
      - "8088:80"
      - "4343:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - korpsinventar
    restart: unless-stopped

volumes:
  korpsinventar-data:
